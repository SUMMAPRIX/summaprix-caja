<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SUMAPRIX · Panel de Caja</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&display=swap');
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; background:#f5f5f7; }
    button { font-family:'DM Sans',sans-serif; cursor:pointer; }
    input,select { font-family:'DM Sans',sans-serif; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes popIn  { 0%{transform:scale(.94);opacity:0} 70%{transform:scale(1.02)} 100%{transform:scale(1);opacity:1} }
    @keyframes slide  { from{transform:translateX(16px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes spin   { to{transform:rotate(360deg)} }
    ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // Firebase init
    const firebaseConfig = {
      apiKey: "AIzaSyDvd7wUTP5Ew9BB5oHAUL_lvGHdmPv0or8",
      authDomain: "sumaprix.firebaseapp.com",
      projectId: "sumaprix",
      storageBucket: "sumaprix.firebasestorage.app",
      messagingSenderId: "1018428764358",
      appId: "1:1018428764358:web:9a15a7b234f637ff6627c7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SUCURSALES = [
      { id:"san-isidro",   nombre:"San Isidro",   zona:"Norte", pin:"1234", cajeros:["Valentina","Rodrigo"] },
      { id:"benavidez",    nombre:"Benavidez",    zona:"Norte", pin:"2345", cajeros:["Lucas","Fernanda"] },
      { id:"talar",        nombre:"Talar",        zona:"Norte", pin:"3456", cajeros:["Mariano","Sofía"] },
      { id:"martinez",     nombre:"Martínez",     zona:"Norte", pin:"4567", cajeros:["Diego","Paula"] },
      { id:"san-fernando", nombre:"San Fernando", zona:"Norte", pin:"5678", cajeros:["Tomás","Belén"] },
      { id:"moreno",       nombre:"Moreno",       zona:"Norte", pin:"6789", cajeros:["Carlos","Jimena"] },
      { id:"canning",      nombre:"Canning",      zona:"Sur",   pin:"7890", cajeros:["Roberto","Laura"] },
      { id:"sgt-cabral",   nombre:"Sgt. Cabral",  zona:"Sur",   pin:"8901", cajeros:["Nicolás","Ana"] },
      { id:"petion",       nombre:"Petión",       zona:"Sur",   pin:"9012", cajeros:["Gabriel","Micaela"] },
    ];

    const PREMIOS_DEFAULT = [
      { id:"p1", nombre:"Gaseosa 2.25L",   pts:500, emoji:"🥤", stock:8,  activo:true },
      { id:"p2", nombre:"Agua x6 unid.",   pts:400, emoji:"💧", stock:12, activo:true },
      { id:"p3", nombre:"Cerveza 1L",      pts:900, emoji:"🍺", stock:3,  activo:true },
      { id:"p4", nombre:"Jugo Cepita x3",  pts:650, emoji:"🧃", stock:7,  activo:true },
      { id:"p5", nombre:"Pack Snacks x4",  pts:750, emoji:"🍟", stock:5,  activo:true },
      { id:"p6", nombre:"Pringles Grande", pts:550, emoji:"🫙", stock:10, activo:true },
    ];
    const getPremios = async () => {
      const snap = await db.collection("premios").where("activo","==",true).get();
      if (snap.empty) return PREMIOS_DEFAULT;
      return snap.docs.map(d=>({id:d.id,...d.data()}));
    };
    const getAllPremios = async () => {
      const snap = await db.collection("premios").get();
      if (snap.empty) return PREMIOS_DEFAULT;
      return snap.docs.map(d=>({id:d.id,...d.data()}));
    };

    const NIVEL = {
      Bronce:   { emoji:"🥉", color:"#b45309", bg:"#fef3c7" },
      Silver:   { emoji:"🥈", color:"#475569", bg:"#f1f5f9" },
      Gold:     { emoji:"🥇", color:"#d97706", bg:"#fffbeb" },
      Platinum: { emoji:"💎", color:"#6d28d9", bg:"#ede9fe" },
    };

    const calcNivel = (pts) => pts >= 5000 ? "Platinum" : pts >= 3000 ? "Gold" : pts >= 1000 ? "Silver" : "Bronce";
    const now  = () => new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
    const hoy  = () => new Date().toLocaleDateString("es-AR");

    // Firebase helpers
    const getCliente = async (dni) => {
      const snap = await db.collection("clientes").doc(dni).get();
      return snap.exists ? { ...snap.data(), dni } : null;
    };
    const saveCliente = async (c) => {
      await db.collection("clientes").doc(c.dni).set(c, { merge: true });
    };
    const logMovimiento = async (mov) => {
      await db.collection("movimientos").add({ ...mov, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    };
    const getMovimientosDia = async (sucursalId) => {
      const snap = await db.collection("movimientos")
        .where("sucursalId","==",sucursalId)
        .where("fecha","==",hoy())
        .get();
      const docs = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      // Sort by hora desc client-side
      return docs.sort((a,b) => (b.hora||"").localeCompare(a.hora||""));
    };

    const Spinner = ({ size=24, color="#E30613" }) => (
      <div style={{ width:size, height:size, border:`3px solid ${color}33`, borderTopColor:color, borderRadius:"50%", animation:"spin .7s linear infinite" }}/>
    );

    // ── LOGIN ──────────────────────────────────────────────────────────────────
    const LoginScreen = ({ onLogin }) => {
      const [sucId, setSucId]   = useState("");
      const [pin, setPin]       = useState("");
      const [cajero, setCajero] = useState("");
      const [err, setErr]       = useState("");
      const [loading, setLoading] = useState(false);
      const suc = SUCURSALES.find(s => s.id === sucId);

      const handleLogin = () => {
        if (!suc)            { setErr("Seleccioná una sucursal"); return; }
        if (pin !== suc.pin) { setErr("PIN incorrecto"); setPin(""); return; }
        if (!cajero)         { setErr("Seleccioná tu nombre"); return; }
        setLoading(true);
        setTimeout(() => onLogin({ sucursal: suc, cajero }), 600);
      };

      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#1a0003,#E30613 60%,#ff6b35)", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
          <div style={{ width:"100%", maxWidth:420, animation:"popIn .4s ease" }}>
            <div style={{ textAlign:"center", marginBottom:28 }}>
              <div style={{ display:"inline-flex", alignItems:"center", gap:12, background:"rgba(255,255,255,.12)", backdropFilter:"blur(12px)", borderRadius:20, padding:"14px 24px", border:"1px solid rgba(255,255,255,.2)" }}>
                <span style={{ fontSize:30 }}>⭐</span>
                <div style={{ textAlign:"left" }}>
                  <div style={{ fontSize:20, fontWeight:900, color:"#fff" }}>SUMAPRIX</div>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,.6)" }}>Panel de Caja · BonPrix</div>
                </div>
              </div>
            </div>
            <div style={{ background:"#fff", borderRadius:24, padding:32, boxShadow:"0 32px 64px rgba(0,0,0,.2)" }}>
              <div style={{ fontSize:20, fontWeight:800, color:"#111", marginBottom:4 }}>Ingresá al sistema</div>
              <div style={{ fontSize:13, color:"#888", marginBottom:24 }}>Seleccioná tu sucursal y autenticáte</div>
              <div style={{ marginBottom:14 }}>
                <label style={{ fontSize:11, fontWeight:700, color:"#555", textTransform:"uppercase", letterSpacing:.5, display:"block", marginBottom:6 }}>Sucursal</label>
                <select value={sucId} onChange={e=>{setSucId(e.target.value);setPin("");setCajero("");setErr("");}}
                  style={{ width:"100%", padding:"11px 14px", borderRadius:12, border:"2px solid #e5e7eb", fontSize:14, fontWeight:600, color:"#111", background:"#fafafa", outline:"none" }}>
                  <option value="">— Seleccioná tu sucursal —</option>
                  {["Norte","Sur"].map(zona=>(
                    <optgroup key={zona} label={`Zona ${zona}`}>
                      {SUCURSALES.filter(s=>s.zona===zona).map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}
                    </optgroup>
                  ))}
                </select>
              </div>
              <div style={{ marginBottom:14 }}>
                <label style={{ fontSize:11, fontWeight:700, color:"#555", textTransform:"uppercase", letterSpacing:.5, display:"block", marginBottom:6 }}>PIN de sucursal</label>
                <input type="password" value={pin} onChange={e=>{setPin(e.target.value);setErr("");}} placeholder="••••" maxLength={6}
                  onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                  style={{ width:"100%", padding:"12px 16px", borderRadius:12, border:`2px solid ${err&&err.includes("PIN")?"#ef4444":"#e5e7eb"}`, fontSize:20, fontWeight:700, letterSpacing:6, color:"#111", background:"#fafafa", outline:"none", textAlign:"center" }}/>
              </div>
              {suc && (
                <div style={{ marginBottom:20, animation:"fadeIn .2s ease" }}>
                  <label style={{ fontSize:11, fontWeight:700, color:"#555", textTransform:"uppercase", letterSpacing:.5, display:"block", marginBottom:6 }}>Tu nombre</label>
                  <div style={{ display:"flex", gap:8 }}>
                    {suc.cajeros.map(c=>(
                      <button key={c} onClick={()=>{setCajero(c);setErr("");}}
                        style={{ flex:1, padding:"11px", borderRadius:12, border:`2px solid ${cajero===c?"#E30613":"#e5e7eb"}`, background:cajero===c?"#fff5f5":"#fafafa", color:cajero===c?"#E30613":"#555", fontWeight:700, fontSize:14, transition:"all .2s" }}>
                        {c}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              {err && <div style={{ fontSize:12, color:"#ef4444", fontWeight:600, marginBottom:12, textAlign:"center" }}>⚠️ {err}</div>}
              <button onClick={handleLogin} disabled={loading}
                style={{ width:"100%", padding:"14px", borderRadius:14, border:"none", background:"linear-gradient(135deg,#E30613,#c0000f)", color:"#fff", fontWeight:800, fontSize:15, boxShadow:"0 8px 24px rgba(227,6,19,.3)", display:"flex", alignItems:"center", justifyContent:"center", gap:10 }}>
                {loading ? <><Spinner size={20} color="#fff"/> Ingresando...</> : "Ingresar al panel →"}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ── SIDEBAR ────────────────────────────────────────────────────────────────
    const Sidebar = ({ tab, setTab, sesion, onLogout, stats }) => {
      const items = [
        { id:"venta",     icon:"💳", label:"Nueva Venta"   },
        { id:"canje",     icon:"🎁", label:"Canjear Premio" },
        { id:"registro",  icon:"➕", label:"Nuevo Cliente"  },
        { id:"consulta",  icon:"🔍", label:"Consultar"      },
        { id:"historial", icon:"📋", label:"Movimientos"    },
        { id:"catalogo",  icon:"🏷️", label:"Catálogo"       },
      ];
      return (
        <div style={{ width:215, background:"#111318", display:"flex", flexDirection:"column", height:"100vh", position:"sticky", top:0, flexShrink:0 }}>
          <div style={{ padding:"22px 18px 14px", borderBottom:"1px solid rgba(255,255,255,.07)" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
              <span style={{ fontSize:22 }}>⭐</span>
              <div>
                <div style={{ fontSize:15, fontWeight:900, color:"#fff" }}>SUMAPRIX</div>
                <div style={{ fontSize:10, color:"#555" }}>Panel de Caja</div>
              </div>
            </div>
            <div style={{ background:"rgba(227,6,19,.15)", border:"1px solid rgba(227,6,19,.25)", borderRadius:10, padding:"8px 12px" }}>
              <div style={{ fontSize:12, fontWeight:700, color:"#E30613" }}>📍 {sesion.sucursal.nombre}</div>
              <div style={{ fontSize:11, color:"#666", marginTop:1 }}>👤 {sesion.cajero}</div>
            </div>
          </div>
          <nav style={{ flex:1, padding:"10px 8px", display:"flex", flexDirection:"column", gap:3 }}>
            {items.map(it=>(
              <button key={it.id} onClick={()=>setTab(it.id)}
                style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 12px", borderRadius:10, border:"none", background:tab===it.id?"rgba(227,6,19,.15)":"transparent", color:tab===it.id?"#ff4444":"#777", fontWeight:tab===it.id?700:500, fontSize:13, transition:"all .15s", textAlign:"left" }}>
                <span style={{ fontSize:16 }}>{it.icon}</span>{it.label}
                {tab===it.id && <div style={{ marginLeft:"auto", width:4, height:4, borderRadius:"50%", background:"#E30613" }}/>}
              </button>
            ))}
          </nav>
          <div style={{ padding:"10px 8px", borderTop:"1px solid rgba(255,255,255,.07)" }}>
            <div style={{ fontSize:10, color:"#444", fontWeight:700, letterSpacing:1, textTransform:"uppercase", marginBottom:6, paddingLeft:4 }}>Hoy</div>
            {[
              { l:"Ventas",       v:stats.ventas,                      c:"#10b981" },
              { l:"Pts emitidos", v:stats.ptsEmitidos.toLocaleString(), c:"#f59e0b" },
              { l:"Canjes",       v:stats.canjes,                      c:"#818cf8" },
            ].map(s=>(
              <div key={s.l} style={{ display:"flex", justifyContent:"space-between", padding:"5px 12px", borderRadius:8 }}>
                <span style={{ fontSize:11, color:"#555" }}>{s.l}</span>
                <span style={{ fontSize:11, fontWeight:800, color:s.c }}>{s.v}</span>
              </div>
            ))}
          </div>
          <div style={{ padding:"10px 8px", borderTop:"1px solid rgba(255,255,255,.07)" }}>
            <button onClick={onLogout}
              style={{ width:"100%", padding:"9px", borderRadius:10, border:"1px solid rgba(255,255,255,.08)", background:"transparent", color:"#555", fontWeight:600, fontSize:12 }}>
              Cerrar sesión →
            </button>
          </div>
        </div>
      );
    };

    // ── PANEL VENTA ────────────────────────────────────────────────────────────
    const PanelVenta = ({ sesion, onVenta, showToast }) => {
      const [dni, setDni]       = useState("");
      const [monto, setMonto]   = useState("");
      const [cliente, setCliente] = useState(null);
      const [step, setStep]     = useState("dni");
      const [loading, setLoading] = useState(false);
      const montoRef = useRef(null);

      const buscar = async () => {
        if (!/^\d{7,8}$/.test(dni)) return;
        setLoading(true);
        const c = await getCliente(dni);
        setLoading(false);
        if (c) { setCliente(c); setStep("monto"); setTimeout(()=>montoRef.current&&montoRef.current.focus(),100); }
        else   { setStep("no_encontrado"); }
      };

      const confirmar = async () => {
        if (!monto || Number(monto) <= 0) return;
        setLoading(true);
        const pts      = Math.floor(Number(monto) * 0.05);
        const nuevoPts = cliente.puntos + pts;
        const updated  = { ...cliente, puntos:nuevoPts, nivel:calcNivel(nuevoPts), compras:cliente.compras+1 };
        await saveCliente(updated);
        await logMovimiento({ tipo:"venta", dni:cliente.dni, nombre:`${cliente.nombre} ${cliente.apellido}`, monto:Number(monto), pts, sucursalId:sesion.sucursal.id, sucursal:sesion.sucursal.nombre, cajero:sesion.cajero, fecha:hoy(), hora:now() });
        onVenta(pts);
        setCliente(updated);
        setLoading(false);
        setStep("done");
        showToast(`✅ +${pts} pts acreditados a ${cliente.nombre}`);
      };

      const reset = () => { setDni(""); setMonto(""); setCliente(null); setStep("dni"); };
      const niv   = cliente ? NIVEL[cliente.nivel] : null;
      const pts   = monto   ? Math.floor(Number(monto)*0.05) : 0;

      return (
        <div style={{ maxWidth:820 }}>
          <div style={{ marginBottom:24 }}>
            <div style={{ fontSize:22, fontWeight:900, color:"#111" }}>Nueva Venta</div>
            <div style={{ fontSize:13, color:"#888" }}>Acreditá puntos SUMAPRIX al cliente</div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:18 }}>
            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              <div style={{ background:"#fff", borderRadius:18, padding:22, boxShadow:"0 2px 10px rgba(0,0,0,.06)", border:step==="dni"?"2px solid #E30613":"2px solid transparent" }}>
                <div style={{ fontSize:12, fontWeight:700, color:"#555", marginBottom:10, display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ width:20,height:20,borderRadius:"50%",background:step==="dni"?"#E30613":"#10b981",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontWeight:900 }}>{step==="dni"?"1":"✓"}</span>
                  DNI del cliente
                </div>
                <div style={{ display:"flex", gap:10 }}>
                  <input value={dni} onChange={e=>setDni(e.target.value.replace(/\D/g,""))} onKeyDown={e=>e.key==="Enter"&&buscar()}
                    placeholder="Ej: 30456789" maxLength={8} disabled={step!=="dni"}
                    style={{ flex:1, padding:"11px 14px", borderRadius:11, border:"2px solid #e5e7eb", fontSize:18, fontWeight:700, letterSpacing:2, outline:"none", background:step!=="dni"?"#f9fafb":"#fff", color:step!=="dni"?"#aaa":"#111" }}/>
                  {step==="dni" && (
                    <button onClick={buscar} disabled={dni.length<7||loading}
                      style={{ padding:"11px 18px", borderRadius:11, border:"none", background:dni.length>=7?"#E30613":"#e5e7eb", color:"#fff", fontWeight:800, fontSize:13, display:"flex", alignItems:"center", gap:6 }}>
                      {loading ? <Spinner size={16} color="#fff"/> : "Buscar"}
                    </button>
                  )}
                  {step!=="dni"&&step!=="done" && (
                    <button onClick={reset} style={{ padding:"11px 14px", borderRadius:11, border:"1px solid #e5e7eb", background:"#fff", color:"#888", fontWeight:600, fontSize:12 }}>Cambiar</button>
                  )}
                </div>
              </div>

              {["monto","done"].includes(step) && (
                <div style={{ background:"#fff", borderRadius:18, padding:22, boxShadow:"0 2px 10px rgba(0,0,0,.06)", border:step==="monto"?"2px solid #E30613":"2px solid transparent", animation:"fadeIn .3s ease" }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"#555", marginBottom:10, display:"flex", alignItems:"center", gap:6 }}>
                    <span style={{ width:20,height:20,borderRadius:"50%",background:step==="monto"?"#E30613":"#10b981",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontWeight:900 }}>{step==="monto"?"2":"✓"}</span>
                    Monto de la compra
                  </div>
                  <div style={{ position:"relative" }}>
                    <span style={{ position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:18,color:"#aaa",fontWeight:700 }}>$</span>
                    <input ref={montoRef} value={monto} onChange={e=>setMonto(e.target.value.replace(/\D/g,""))} onKeyDown={e=>e.key==="Enter"&&confirmar()} disabled={step!=="monto"} placeholder="0"
                      style={{ width:"100%", padding:"13px 14px 13px 32px", borderRadius:11, border:"2px solid #e5e7eb", fontSize:26, fontWeight:800, outline:"none", background:step!=="monto"?"#f9fafb":"#fff", color:step!=="monto"?"#aaa":"#111" }}/>
                  </div>
                  {monto&&step==="monto" && <div style={{ marginTop:8, padding:"9px 12px", background:"#f0fdf4", borderRadius:9, fontSize:12, color:"#15803d", fontWeight:700 }}>⭐ El cliente ganará <strong>+{pts} puntos</strong></div>}
                  {step==="monto" && (
                    <button onClick={confirmar} disabled={!monto||loading}
                      style={{ marginTop:12, width:"100%", padding:"13px", borderRadius:12, border:"none", background:monto?"linear-gradient(135deg,#E30613,#c0000f)":"#e5e7eb", color:"#fff", fontWeight:800, fontSize:14, boxShadow:monto?"0 6px 18px rgba(227,6,19,.25)":"none", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                      {loading ? <><Spinner size={18} color="#fff"/> Procesando...</> : "Confirmar venta ✓"}
                    </button>
                  )}
                </div>
              )}

              {step==="no_encontrado" && (
                <div style={{ background:"#fffbeb", borderRadius:18, padding:22, border:"2px solid #fde68a", animation:"fadeIn .3s ease" }}>
                  <div style={{ fontSize:14, fontWeight:800, color:"#92400e", marginBottom:6 }}>⚠️ Cliente no registrado</div>
                  <div style={{ fontSize:13, color:"#78350f", marginBottom:14, lineHeight:1.6 }}>DNI <strong>{dni}</strong> no está en SUMAPRIX.</div>
                  <div style={{ display:"flex", gap:8 }}>
                    <button onClick={reset} style={{ flex:1, padding:"10px", borderRadius:10, border:"1px solid #fcd34d", background:"#fff", color:"#92400e", fontWeight:700, fontSize:12 }}>Ignorar</button>
                    <button onClick={()=>showToast("💡 Andá a 'Nuevo Cliente' en el menú")} style={{ flex:2, padding:"10px", borderRadius:10, border:"none", background:"#f59e0b", color:"#fff", fontWeight:800, fontSize:12 }}>Registrar ➕</button>
                  </div>
                </div>
              )}
            </div>

            <div>
              {!cliente && step!=="no_encontrado" && (
                <div style={{ background:"#fff", borderRadius:18, padding:32, textAlign:"center", boxShadow:"0 2px 10px rgba(0,0,0,.06)", height:"100%", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:10 }}>
                  <div style={{ fontSize:44, opacity:.1 }}>👤</div>
                  <div style={{ fontSize:13, color:"#ccc" }}>Ingresá el DNI para ver la ficha</div>
                </div>
              )}
              {cliente && step!=="done" && (
                <div style={{ background:"#fff", borderRadius:18, padding:22, boxShadow:"0 2px 10px rgba(0,0,0,.06)", animation:"slide .3s ease" }}>
                  <div style={{ display:"flex", alignItems:"flex-start", gap:12, marginBottom:18, paddingBottom:18, borderBottom:"1px solid #f3f4f6" }}>
                    <div style={{ width:48,height:48,borderRadius:12,background:niv.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0 }}>{niv.emoji}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:17, fontWeight:900, color:"#111" }}>{cliente.nombre} {cliente.apellido}</div>
                      <div style={{ fontSize:11, color:"#aaa" }}>DNI {cliente.dni}</div>
                      <div style={{ display:"inline-flex", alignItems:"center", marginTop:4, background:niv.bg, borderRadius:20, padding:"2px 10px" }}>
                        <span style={{ fontSize:10, fontWeight:800, color:niv.color }}>Nivel {cliente.nivel}</span>
                      </div>
                    </div>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:16 }}>
                    {[
                      { l:"Puntos",   v:cliente.puntos.toLocaleString(), c:"#f59e0b" },
                      { l:"Compras",  v:cliente.compras,                 c:"#6366f1" },
                      { l:"Cashback", v:`$${(cliente.puntos*.05).toFixed(0)}`, c:"#10b981" },
                    ].map(s=>(
                      <div key={s.l} style={{ background:"#f9fafb", borderRadius:10, padding:"10px 8px", textAlign:"center" }}>
                        <div style={{ fontSize:18, fontWeight:900, color:s.c }}>{s.v}</div>
                        <div style={{ fontSize:9, color:"#aaa", fontWeight:600 }}>{s.l}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {step==="done" && cliente && (
                <div style={{ background:"linear-gradient(135deg,#064e3b,#065f46)", borderRadius:18, padding:26, textAlign:"center", animation:"popIn .4s ease", boxShadow:"0 8px 28px rgba(6,78,59,.3)" }}>
                  <div style={{ fontSize:48, marginBottom:8 }}>✅</div>
                  <div style={{ fontSize:18, fontWeight:900, color:"#fff", marginBottom:4 }}>¡Venta procesada!</div>
                  <div style={{ fontSize:13, color:"rgba(255,255,255,.7)", marginBottom:18 }}>Guardado en Firebase · {now()}</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>
                    <div style={{ background:"rgba(0,0,0,.2)", borderRadius:10, padding:12 }}>
                      <div style={{ fontSize:22, fontWeight:900, color:"#6ee7b7" }}>+{pts}</div>
                      <div style={{ fontSize:10, color:"rgba(255,255,255,.5)" }}>pts ganados</div>
                    </div>
                    <div style={{ background:"rgba(0,0,0,.2)", borderRadius:10, padding:12 }}>
                      <div style={{ fontSize:22, fontWeight:900, color:"#fcd34d" }}>{cliente.puntos.toLocaleString()}</div>
                      <div style={{ fontSize:10, color:"rgba(255,255,255,.5)" }}>saldo total</div>
                    </div>
                  </div>
                  <button onClick={reset} style={{ width:"100%", padding:"12px", borderRadius:12, border:"none", background:"rgba(255,255,255,.15)", color:"#fff", fontWeight:800, fontSize:13, cursor:"pointer" }}>
                    Nueva venta →
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // ── PANEL CANJE ────────────────────────────────────────────────────────────
    const PanelCanje = ({ sesion, onCanje, showToast }) => {
      const [dni, setDni]         = useState("");
      const [cliente, setCliente] = useState(null);
      const [sel, setSel]         = useState(null);
      const [done, setDone]       = useState(false);
      const [loading, setLoading] = useState(false);
      const [premios, setPremios] = useState([]);
      useEffect(()=>{ getPremios().then(setPremios); },[]);

      const buscar = async () => {
        if (!/^\d{7,8}$/.test(dni)) return;
        setLoading(true);
        const c = await getCliente(dni);
        setLoading(false);
        if (c) { setCliente(c); setSel(null); setDone(false); }
        else showToast("⚠️ DNI no encontrado");
      };

      const confirmarCanje = async () => {
        if (!sel||cliente.puntos<sel.pts) return;
        setLoading(true);
        const nuevoPts = cliente.puntos - sel.pts;
        const updated  = { ...cliente, puntos:nuevoPts, nivel:calcNivel(nuevoPts) };
        await saveCliente(updated);
        await logMovimiento({ tipo:"canje", dni:cliente.dni, nombre:`${cliente.nombre} ${cliente.apellido}`, premio:sel.nombre, pts:sel.pts, sucursalId:sesion.sucursal.id, sucursal:sesion.sucursal.nombre, cajero:sesion.cajero, fecha:hoy(), hora:now() });
        setCliente(updated); onCanje(); setLoading(false); setDone(true);
        showToast(`🎁 ${sel.nombre} canjeado`);
      };

      const reset = () => { setDni(""); setCliente(null); setSel(null); setDone(false); };
      const niv = cliente ? NIVEL[cliente.nivel] : null;

      return (
        <div style={{ maxWidth:900 }}>
          <div style={{ marginBottom:24 }}>
            <div style={{ fontSize:22, fontWeight:900, color:"#111" }}>Canjear Premio</div>
            <div style={{ fontSize:13, color:"#888" }}>Descontá puntos y entregá el premio al cliente</div>
          </div>
          <div style={{ background:"#fff", borderRadius:18, padding:18, boxShadow:"0 2px 10px rgba(0,0,0,.06)", marginBottom:18, display:"flex", gap:10 }}>
            <input value={dni} onChange={e=>setDni(e.target.value.replace(/\D/g,""))} onKeyDown={e=>e.key==="Enter"&&buscar()} placeholder="DNI del cliente" maxLength={8}
              style={{ flex:1, padding:"11px 14px", borderRadius:11, border:"2px solid #e5e7eb", fontSize:17, fontWeight:700, letterSpacing:2, outline:"none" }}/>
            <button onClick={buscar} disabled={dni.length<7||loading}
              style={{ padding:"11px 20px", borderRadius:11, border:"none", background:dni.length>=7?"#E30613":"#e5e7eb", color:"#fff", fontWeight:800, fontSize:13, display:"flex", alignItems:"center", gap:6 }}>
              {loading ? <Spinner size={16} color="#fff"/> : "Buscar"}
            </button>
          </div>
          {cliente && !done && (
            <div style={{ display:"grid", gridTemplateColumns:"260px 1fr", gap:18, animation:"fadeIn .3s ease" }}>
              <div style={{ background:"#fff", borderRadius:18, padding:18, boxShadow:"0 2px 10px rgba(0,0,0,.06)" }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14, paddingBottom:14, borderBottom:"1px solid #f3f4f6" }}>
                  <div style={{ width:40,height:40,borderRadius:10,background:niv.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20 }}>{niv.emoji}</div>
                  <div>
                    <div style={{ fontSize:14, fontWeight:800, color:"#111" }}>{cliente.nombre} {cliente.apellido}</div>
                    <div style={{ fontSize:11, color:"#aaa" }}>DNI {cliente.dni}</div>
                  </div>
                </div>
                <div style={{ textAlign:"center", padding:"14px 0", borderBottom:"1px solid #f3f4f6", marginBottom:10 }}>
                  <div style={{ fontSize:32, fontWeight:900, color:"#f59e0b" }}>{cliente.puntos.toLocaleString()}</div>
                  <div style={{ fontSize:11, color:"#aaa", fontWeight:600 }}>PUNTOS DISPONIBLES</div>
                </div>
                {sel && <div style={{ background:cliente.puntos>=sel.pts?"#f0fdf4":"#fef2f2", borderRadius:10, padding:10, textAlign:"center" }}>
                  <div style={{ fontSize:12, fontWeight:700, color:cliente.puntos>=sel.pts?"#15803d":"#dc2626" }}>
                    {cliente.puntos>=sel.pts?"✅ Puede canjear":`❌ Le faltan ${sel.pts-cliente.puntos} pts`}
                  </div>
                </div>}
              </div>
              <div>
                <div style={{ fontSize:12, fontWeight:700, color:"#aaa", textTransform:"uppercase", letterSpacing:.5, marginBottom:10 }}>Seleccioná el premio</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:14 }}>
                  {premios.map(p=>{
                    const puede=cliente.puntos>=p.pts, isSel=sel&&sel.id===p.id;
                    return <div key={p.id} onClick={()=>puede&&setSel(p)}
                      style={{ background:"#fff", borderRadius:14, padding:14, textAlign:"center", cursor:puede?"pointer":"not-allowed", border:`2px solid ${isSel?"#E30613":puede?"#e5e7eb":"#f3f4f6"}`, opacity:puede?1:.45 }}>
                      <div style={{ fontSize:28, marginBottom:5 }}>{p.emoji}</div>
                      <div style={{ fontSize:11, fontWeight:700, color:"#111", marginBottom:3 }}>{p.nombre}</div>
                      <div style={{ fontSize:13, fontWeight:900, color:"#E30613" }}>{p.pts} pts</div>
                    </div>;
                  })}
                </div>
                {sel&&cliente.puntos>=sel.pts && (
                  <button onClick={confirmarCanje} disabled={loading}
                    style={{ width:"100%", padding:"14px", borderRadius:14, border:"none", background:"linear-gradient(135deg,#E30613,#c0000f)", color:"#fff", fontWeight:800, fontSize:14, boxShadow:"0 6px 20px rgba(227,6,19,.25)", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                    {loading?<><Spinner size={18} color="#fff"/> Procesando...</>:`Confirmar canje · -${sel.pts} pts ✓`}
                  </button>
                )}
              </div>
            </div>
          )}
          {done&&sel && (
            <div style={{ background:"linear-gradient(135deg,#4c1d95,#5b21b6)", borderRadius:18, padding:28, textAlign:"center", animation:"popIn .4s ease", maxWidth:400 }}>
              <div style={{ fontSize:48, marginBottom:10 }}>{sel.emoji}</div>
              <div style={{ fontSize:20, fontWeight:900, color:"#fff", marginBottom:4 }}>¡Premio canjeado!</div>
              <div style={{ fontSize:13, color:"rgba(255,255,255,.7)", marginBottom:18 }}>Entregá <strong style={{color:"#fff"}}>{sel.nombre}</strong></div>
              <div style={{ background:"rgba(0,0,0,.2)", borderRadius:12, padding:14, marginBottom:18 }}>
                <div style={{ fontSize:26, fontWeight:900, color:"#c4b5fd" }}>{cliente.puntos.toLocaleString()}</div>
                <div style={{ fontSize:11, color:"rgba(255,255,255,.5)" }}>puntos restantes</div>
              </div>
              <button onClick={reset} style={{ width:"100%", padding:"12px", borderRadius:12, border:"none", background:"rgba(255,255,255,.15)", color:"#fff", fontWeight:800, fontSize:13, cursor:"pointer" }}>Nuevo canje →</button>
            </div>
          )}
        </div>
      );
    };

    // ── PANEL REGISTRO ─────────────────────────────────────────────────────────
    const PanelRegistro = ({ sesion, showToast }) => {
      const [form, setForm]   = useState({ dni:"", nombre:"", apellido:"", nacimiento:"", sexo:"", tel:"", email:"" });
      const [err, setErr]     = useState({});
      const [done, setDone]   = useState(null);
      const [loading, setLoading] = useState(false);
      const set = (k,v) => { setForm(f=>({...f,[k]:v})); setErr(e=>({...e,[k]:""})); };

      const guardar = async () => {
        setLoading(true);
        const e = {};
        if (!/^\d{7,8}$/.test(form.dni)) e.dni="DNI inválido";
        else { const ex=await getCliente(form.dni); if(ex) e.dni="Ya está registrado"; }
        if (form.nombre.trim().length<2) e.nombre="Requerido";
        if (form.apellido.trim().length<2) e.apellido="Requerido";
        const limpio=form.nacimiento.replace(/\D/g,"");
        if (limpio.length!==8) e.nacimiento="Ingresá 8 números · Ej: 15031990";
        else {
          const fb=`${limpio.slice(0,2)}/${limpio.slice(2,4)}/${limpio.slice(4)}`;
          const [d,m,y]=fb.split("/").map(Number);
          const f=new Date(y,m-1,d);
          if(!(f.getFullYear()===y&&f.getMonth()===m-1&&f.getDate()===d&&y>=1920&&y<=2008)) e.nacimiento="Fecha inválida";
        }
        if (!form.sexo) e.sexo="Seleccioná una opción";
        if (form.tel && !/^[\d\s\-\+\(\)]{6,20}$/.test(form.tel)) e.tel="Teléfono inválido";
        if (form.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email="Email inválido";
        if (Object.keys(e).length>0) { setErr(e); setLoading(false); return; }
        const limpio2=form.nacimiento.replace(/\D/g,"");
        const nacFmt=`${limpio2.slice(0,2)}/${limpio2.slice(2,4)}/${limpio2.slice(4)}`;
        const nuevo={ dni:form.dni, nombre:form.nombre.trim(), apellido:form.apellido.trim(), nacimiento:nacFmt, sexo:form.sexo, tel:form.tel.trim(), email:form.email.trim(), puntos:250, nivel:"Bronce", compras:0, registrado:hoy(), sucursalOrigen:sesion.sucursal.nombre, historial:[] };
        await saveCliente(nuevo);
        await logMovimiento({ tipo:"registro", dni:nuevo.dni, nombre:`${nuevo.nombre} ${nuevo.apellido}`, pts:250, sucursalId:sesion.sucursal.id, sucursal:sesion.sucursal.nombre, cajero:sesion.cajero, fecha:hoy(), hora:now() });
        setDone(nuevo); setLoading(false);
        showToast(`🎉 ${nuevo.nombre} registrado en Firebase`);
      };

      const reset = () => { setForm({dni:"",nombre:"",apellido:"",nacimiento:"",sexo:"",tel:"",email:""}); setErr({}); setDone(null); };

      if (done) return (
        <div style={{ maxWidth:460, animation:"popIn .4s ease" }}>
          <div style={{ background:"linear-gradient(135deg,#064e3b,#065f46)", borderRadius:22, padding:32, textAlign:"center", boxShadow:"0 12px 36px rgba(6,78,59,.25)" }}>
            <div style={{fontSize:52,marginBottom:10}}>🎉</div>
            <div style={{fontSize:20,fontWeight:900,color:"#fff",marginBottom:4}}>¡Registrado en Firebase!</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,.7)",marginBottom:22}}>{done.nombre} {done.apellido} · DNI {done.dni}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
              <div style={{background:"rgba(0,0,0,.2)",borderRadius:10,padding:12}}><div style={{fontSize:24,fontWeight:900,color:"#6ee7b7"}}>250</div><div style={{fontSize:10,color:"rgba(255,255,255,.5)"}}>pts bienvenida</div></div>
              <div style={{background:"rgba(0,0,0,.2)",borderRadius:10,padding:12}}><div style={{fontSize:24,fontWeight:900,color:"#fcd34d"}}>🥉</div><div style={{fontSize:10,color:"rgba(255,255,255,.5)"}}>Nivel Bronce</div></div>
            </div>
            <button onClick={reset} style={{width:"100%",padding:"12px",borderRadius:12,border:"none",background:"rgba(255,255,255,.15)",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>Registrar otro →</button>
          </div>
        </div>
      );

      return (
        <div style={{ maxWidth:680 }}>
          <div style={{ marginBottom:24 }}>
            <div style={{ fontSize:22, fontWeight:900, color:"#111" }}>Nuevo Cliente</div>
            <div style={{ fontSize:13, color:"#888" }}>Se guarda directo en Firebase · 250 pts de bienvenida</div>
          </div>
          <div style={{ background:"#fff", borderRadius:22, padding:28, boxShadow:"0 2px 14px rgba(0,0,0,.07)" }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>
              {[["DNI *","dni","30456789",8,"numeric"],["","_","","",],["Nombre *","nombre","María","",""],["Apellido *","apellido","García","",""],["Fecha nacimiento *","nacimiento","15031990",8,"numeric"],["Teléfono","tel","11 1234-5678","","tel"],["Email","email","maria@gmail.com","","email"]].map(([label,k,ph,ml,im])=>
                k&&k!=="__"&&k!=="_" ? (
                  <div key={k}>
                    <label style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>{label}</label>
                    <input value={form[k]} onChange={e=>set(k,e.target.value)} placeholder={ph} maxLength={ml||undefined} inputMode={im||"text"}
                      style={{width:"100%",padding:"10px 14px",borderRadius:11,border:`2px solid ${err[k]?"#ef4444":"#e5e7eb"}`,fontSize:14,fontWeight:600,outline:"none",color:"#111"}}/>
                    {err[k]&&<div style={{fontSize:11,color:"#ef4444",marginTop:3,fontWeight:600}}>⚠️ {err[k]}</div>}
                  </div>
                ) : <div key={k}/>
              )}
              <div>
                <label style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Género *</label>
                <div style={{display:"flex",gap:8}}>
                  {[["M","👨 Masc."],["F","👩 Fem."],["NB","🧑 N/B"]].map(([v,l])=>(
                    <button key={v} onClick={()=>set("sexo",v)}
                      style={{flex:1,padding:"10px 6px",borderRadius:10,border:`2px solid ${form.sexo===v?"#E30613":"#e5e7eb"}`,background:form.sexo===v?"#fff5f5":"#fafafa",color:form.sexo===v?"#E30613":"#555",fontWeight:700,fontSize:12,transition:"all .2s"}}>
                      {l}
                    </button>
                  ))}
                </div>
                {err.sexo&&<div style={{fontSize:11,color:"#ef4444",marginTop:3,fontWeight:600}}>⚠️ {err.sexo}</div>}
              </div>
            </div>
            <div style={{background:"#f0fdf4",borderRadius:10,padding:"10px 14px",marginBottom:18,fontSize:12,color:"#15803d",fontWeight:600}}>
              ⭐ Al registrarse recibe <strong>250 puntos</strong> de bienvenida
            </div>
            <button onClick={guardar} disabled={loading}
              style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#E30613,#c0000f)",color:"#fff",fontWeight:800,fontSize:15,boxShadow:"0 8px 22px rgba(227,6,19,.25)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {loading?<><Spinner size={18} color="#fff"/> Guardando...</>:"Registrar cliente 🎉"}
            </button>
          </div>
        </div>
      );
    };

    // ── PANEL CONSULTA ─────────────────────────────────────────────────────────
    const PanelConsulta = () => {
      const [dni, setDni]           = useState("");
      const [cliente, setCliente]   = useState(null);
      const [notFound, setNotFound] = useState(false);
      const [loading, setLoading]   = useState(false);
      const [editando, setEditando] = useState(false);
      const [form, setForm]         = useState({});
      const [saving, setSaving]     = useState(false);
      const [saved, setSaved]       = useState(false);

      const buscar = async () => {
        if (!/^\d{7,8}$/.test(dni)) return;
        setLoading(true);
        const c = await getCliente(dni);
        setLoading(false);
        if (c) { setCliente(c); setNotFound(false); setEditando(false); setSaved(false); }
        else   { setCliente(null); setNotFound(true); }
      };

      const iniciarEdicion = () => {
        setForm({
          nombre:    cliente.nombre    || "",
          apellido:  cliente.apellido  || "",
          nacimiento:cliente.nacimiento|| "",
          tel:       cliente.tel       || "",
          email:     cliente.email     || "",
          sexo:      cliente.sexo      || "",
        });
        setEditando(true);
        setSaved(false);
      };

      const guardarEdicion = async () => {
        setSaving(true);
        const updated = { ...cliente, ...form, nombre:form.nombre.trim(), apellido:form.apellido.trim(), tel:form.tel.trim(), email:form.email.trim() };
        await saveCliente(updated);
        setCliente(updated);
        setSaving(false);
        setEditando(false);
        setSaved(true);
        setTimeout(()=>setSaved(false), 3000);
      };

      const set = (k,v) => setForm(f=>({...f,[k]:v}));
      const niv = cliente ? NIVEL[cliente.nivel] : null;

      return (
        <div style={{ maxWidth:700 }}>
          <div style={{ marginBottom:24 }}>
            <div style={{ fontSize:22, fontWeight:900, color:"#111" }}>Consultar Cliente</div>
            <div style={{ fontSize:13, color:"#888" }}>Datos en tiempo real desde Firebase</div>
          </div>
          <div style={{ background:"#fff", borderRadius:18, padding:18, boxShadow:"0 2px 10px rgba(0,0,0,.06)", marginBottom:18, display:"flex", gap:10 }}>
            <input value={dni} onChange={e=>setDni(e.target.value.replace(/\D/g,""))} onKeyDown={e=>e.key==="Enter"&&buscar()} placeholder="Ingresá el DNI" maxLength={8}
              style={{flex:1,padding:"11px 14px",borderRadius:11,border:"2px solid #e5e7eb",fontSize:17,fontWeight:700,letterSpacing:2,outline:"none"}}/>
            <button onClick={buscar} disabled={dni.length<7||loading}
              style={{padding:"11px 20px",borderRadius:11,border:"none",background:dni.length>=7?"#111":"#e5e7eb",color:"#fff",fontWeight:800,fontSize:13,display:"flex",alignItems:"center",gap:6}}>
              {loading?<Spinner size={16} color="#fff"/>:"Buscar"}
            </button>
          </div>

          {notFound && <div style={{background:"#fef2f2",borderRadius:14,padding:18,textAlign:"center",color:"#dc2626",fontWeight:700,fontSize:13}}>⚠️ DNI {dni} no encontrado</div>}

          {saved && <div style={{background:"#f0fdf4",borderRadius:14,padding:"12px 18px",marginBottom:14,textAlign:"center",color:"#15803d",fontWeight:700,fontSize:13,animation:"fadeIn .3s ease"}}>✅ Datos actualizados correctamente en Firebase</div>}

          {cliente && !editando && (
            <div style={{ background:"#fff", borderRadius:18, padding:22, boxShadow:"0 2px 10px rgba(0,0,0,.06)", animation:"fadeIn .3s ease" }}>
              <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:18, paddingBottom:18, borderBottom:"1px solid #f3f4f6" }}>
                <div style={{width:52,height:52,borderRadius:14,background:niv.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>{niv.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:19,fontWeight:900,color:"#111"}}>{cliente.nombre} {cliente.apellido}</div>
                  <div style={{fontSize:12,color:"#aaa"}}>DNI {cliente.dni} · Registrado: {cliente.registrado||"—"}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{background:niv.bg,borderRadius:10,padding:"7px 14px"}}>
                    <div style={{fontSize:12,fontWeight:800,color:niv.color}}>Nivel {cliente.nivel}</div>
                  </div>
                  <button onClick={iniciarEdicion}
                    style={{padding:"7px 14px",borderRadius:10,border:"2px solid #e5e7eb",background:"#fff",color:"#555",fontWeight:700,fontSize:12,display:"flex",alignItems:"center",gap:5}}>
                    ✏️ Editar
                  </button>
                </div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10 }}>
                {[
                  {l:"Puntos",     v:cliente.puntos.toLocaleString(), c:"#f59e0b"},
                  {l:"Cashback",   v:`$${(cliente.puntos*.05).toFixed(0)}`, c:"#10b981"},
                  {l:"Compras",    v:cliente.compras, c:"#6366f1"},
                  {l:"Nacimiento", v:cliente.nacimiento||"—", c:"#64748b"},
                  {l:"Teléfono",   v:cliente.tel||"—", c:"#0ea5e9"},
                  {l:"Email",      v:cliente.email||"—", c:"#8b5cf6"},
                ].map(s=>(
                  <div key={s.l} style={{background:"#f9fafb",borderRadius:10,padding:10,textAlign:"center"}}>
                    <div style={{fontSize:14,fontWeight:900,color:s.c,wordBreak:"break-all"}}>{s.v}</div>
                    <div style={{fontSize:9,color:"#aaa",fontWeight:600,marginTop:2}}>{s.l}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {cliente && editando && (
            <div style={{ background:"#fff", borderRadius:18, padding:24, boxShadow:"0 2px 10px rgba(0,0,0,.06)", animation:"fadeIn .3s ease" }}>
              <div style={{ fontSize:15, fontWeight:800, color:"#111", marginBottom:4 }}>Editando ficha de {cliente.nombre}</div>
              <div style={{ fontSize:12, color:"#aaa", marginBottom:20 }}>DNI {cliente.dni} · Los puntos y nivel no se pueden modificar desde acá</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:16 }}>
                {[
                  ["Nombre",     "nombre",     "María",           ""],
                  ["Apellido",   "apellido",   "García",          ""],
                  ["Nacimiento", "nacimiento", "15/03/1990",      ""],
                  ["Teléfono",   "tel",        "11 1234-5678",    "tel"],
                  ["Email",      "email",      "maria@gmail.com", "email"],
                ].map(([label,k,ph,im])=>(
                  <div key={k}>
                    <label style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>{label}</label>
                    <input value={form[k]||""} onChange={e=>set(k,e.target.value)} placeholder={ph} inputMode={im||"text"}
                      style={{width:"100%",padding:"10px 14px",borderRadius:11,border:"2px solid #e5e7eb",fontSize:14,fontWeight:600,outline:"none",color:"#111"}}/>
                  </div>
                ))}
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Género</label>
                  <div style={{display:"flex",gap:8}}>
                    {[["M","👨 Masc."],["F","👩 Fem."],["NB","🧑 N/B"]].map(([v,l])=>(
                      <button key={v} onClick={()=>set("sexo",v)}
                        style={{flex:1,padding:"9px 4px",borderRadius:10,border:`2px solid ${form.sexo===v?"#E30613":"#e5e7eb"}`,background:form.sexo===v?"#fff5f5":"#fafafa",color:form.sexo===v?"#E30613":"#555",fontWeight:700,fontSize:11}}>
                        {l}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setEditando(false)}
                  style={{flex:1,padding:"12px",borderRadius:12,border:"1px solid #e5e7eb",background:"#fff",color:"#555",fontWeight:700,fontSize:13}}>
                  Cancelar
                </button>
                <button onClick={guardarEdicion} disabled={saving}
                  style={{flex:2,padding:"12px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#E30613,#c0000f)",color:"#fff",fontWeight:800,fontSize:14,boxShadow:"0 6px 18px rgba(227,6,19,.25)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  {saving?<><Spinner size={16} color="#fff"/> Guardando...</>:"Guardar cambios ✓"}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ── PANEL CATALOGO ─────────────────────────────────────────────────────────
    const PanelCatalogo = ({ showToast }) => {
      const [premios, setPremios]   = useState([]);
      const [loading, setLoading]   = useState(true);
      const [editando, setEditando] = useState(null); // null | "nuevo" | premio.id
      const [form, setForm]         = useState({ nombre:"", pts:"", emoji:"🎁", stock:"", activo:true });
      const [saving, setSaving]     = useState(false);

      const cargar = async () => {
        setLoading(true);
        const lista = await getAllPremios();
        setPremios(lista);
        setLoading(false);
      };

      useEffect(()=>{ cargar(); },[]);

      const iniciarNuevo = () => {
        setForm({ nombre:"", pts:"", emoji:"🎁", stock:"10", activo:true });
        setEditando("nuevo");
      };

      const iniciarEdicion = (p) => {
        setForm({ nombre:p.nombre, pts:String(p.pts), emoji:p.emoji||"🎁", stock:String(p.stock||0), activo:p.activo!==false });
        setEditando(p.id);
      };

      const guardar = async () => {
        if (!form.nombre.trim() || !form.pts) { showToast("⚠️ Completá nombre y puntos"); return; }
        setSaving(true);
        const data = { nombre:form.nombre.trim(), pts:Number(form.pts), emoji:form.emoji, stock:Number(form.stock||0), activo:form.activo };
        if (editando === "nuevo") {
          await db.collection("premios").add(data);
          showToast(`✅ Premio "${data.nombre}" agregado`);
        } else {
          await db.collection("premios").doc(editando).set(data, { merge:true });
          showToast(`✅ Premio "${data.nombre}" actualizado`);
        }
        setSaving(false);
        setEditando(null);
        cargar();
      };

      const toggleActivo = async (p) => {
        await db.collection("premios").doc(p.id).set({ activo:!p.activo }, { merge:true });
        showToast(p.activo ? `⏸️ "${p.nombre}" desactivado` : `▶️ "${p.nombre}" activado`);
        cargar();
      };

      const set = (k,v) => setForm(f=>({...f,[k]:v}));

      const EMOJIS = ["🥤","💧","🍺","🧃","🍟","🫙","🍕","🍫","☕","🧁","🎁","🛍️","🏆","⭐","🎯"];

      return (
        <div style={{ maxWidth:800 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:24 }}>
            <div>
              <div style={{ fontSize:22, fontWeight:900, color:"#111" }}>Catálogo de Premios</div>
              <div style={{ fontSize:13, color:"#888" }}>Administrá los premios disponibles para canje</div>
            </div>
            {!editando && (
              <button onClick={iniciarNuevo}
                style={{ padding:"11px 20px", borderRadius:12, border:"none", background:"linear-gradient(135deg,#E30613,#c0000f)", color:"#fff", fontWeight:800, fontSize:13, boxShadow:"0 4px 14px rgba(227,6,19,.25)" }}>
                + Agregar premio
              </button>
            )}
          </div>

          {editando && (
            <div style={{ background:"#fff", borderRadius:20, padding:24, boxShadow:"0 4px 16px rgba(0,0,0,.08)", marginBottom:20, border:"2px solid rgba(227,6,19,.15)", animation:"fadeIn .3s ease" }}>
              <div style={{ fontSize:15, fontWeight:800, color:"#111", marginBottom:18 }}>
                {editando==="nuevo" ? "➕ Nuevo premio" : "✏️ Editar premio"}
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:16 }}>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Nombre del premio *</label>
                  <input value={form.nombre} onChange={e=>set("nombre",e.target.value)} placeholder="Ej: Gaseosa 2.25L"
                    style={{width:"100%",padding:"10px 14px",borderRadius:11,border:"2px solid #e5e7eb",fontSize:14,fontWeight:600,outline:"none",color:"#111"}}/>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Puntos requeridos *</label>
                  <input value={form.pts} onChange={e=>set("pts",e.target.value.replace(/\D/g,""))} placeholder="500" inputMode="numeric"
                    style={{width:"100%",padding:"10px 14px",borderRadius:11,border:"2px solid #e5e7eb",fontSize:14,fontWeight:600,outline:"none",color:"#111"}}/>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Stock disponible</label>
                  <input value={form.stock} onChange={e=>set("stock",e.target.value.replace(/\D/g,""))} placeholder="10" inputMode="numeric"
                    style={{width:"100%",padding:"10px 14px",borderRadius:11,border:"2px solid #e5e7eb",fontSize:14,fontWeight:600,outline:"none",color:"#111"}}/>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Emoji</label>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {EMOJIS.map(e=>(
                      <button key={e} onClick={()=>set("emoji",e)}
                        style={{width:36,height:36,borderRadius:8,border:`2px solid ${form.emoji===e?"#E30613":"#e5e7eb"}`,background:form.emoji===e?"#fff5f5":"#fafafa",fontSize:18,cursor:"pointer"}}>
                        {e}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,padding:"10px 14px",background:"#f9fafb",borderRadius:10}}>
                <span style={{fontSize:13,fontWeight:600,color:"#555"}}>Estado:</span>
                <button onClick={()=>set("activo",!form.activo)}
                  style={{padding:"5px 14px",borderRadius:20,border:"none",background:form.activo?"#dcfce7":"#fee2e2",color:form.activo?"#15803d":"#dc2626",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                  {form.activo?"✅ Activo":"⏸️ Inactivo"}
                </button>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setEditando(null)}
                  style={{flex:1,padding:"11px",borderRadius:11,border:"1px solid #e5e7eb",background:"#fff",color:"#555",fontWeight:700,fontSize:13}}>
                  Cancelar
                </button>
                <button onClick={guardar} disabled={saving}
                  style={{flex:2,padding:"11px",borderRadius:11,border:"none",background:"linear-gradient(135deg,#E30613,#c0000f)",color:"#fff",fontWeight:800,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  {saving?<><Spinner size={16} color="#fff"/> Guardando...</>:"Guardar en Firebase ✓"}
                </button>
              </div>
            </div>
          )}

          {loading && <div style={{padding:40,textAlign:"center",display:"flex",justifyContent:"center"}}><Spinner size={32}/></div>}

          {!loading && (
            <div style={{ background:"#fff", borderRadius:18, overflow:"hidden", boxShadow:"0 2px 10px rgba(0,0,0,.06)" }}>
              {premios.length===0 && (
                <div style={{padding:40,textAlign:"center",color:"#ccc"}}>
                  <div style={{fontSize:36,marginBottom:8}}>🏷️</div>
                  <div style={{fontSize:13}}>No hay premios cargados aún</div>
                </div>
              )}
              {premios.map((p,i)=>(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",borderBottom:i<premios.length-1?"1px solid #f3f4f6":"none",opacity:p.activo===false?0.5:1,transition:"opacity .2s"}}>
                  <div style={{width:44,height:44,borderRadius:12,background:"#f9fafb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>
                    {p.emoji||"🎁"}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:800,color:"#111"}}>{p.nombre}</div>
                    <div style={{fontSize:11,color:"#aaa",marginTop:2}}>Stock: {p.stock||0} unid.</div>
                  </div>
                  <div style={{fontSize:16,fontWeight:900,color:"#E30613",minWidth:70,textAlign:"center"}}>{p.pts} pts</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>iniciarEdicion(p)}
                      style={{padding:"6px 12px",borderRadius:8,border:"1px solid #e5e7eb",background:"#fff",color:"#555",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                      ✏️
                    </button>
                    <button onClick={()=>toggleActivo(p)}
                      style={{padding:"6px 12px",borderRadius:8,border:"none",background:p.activo===false?"#dcfce7":"#fee2e2",color:p.activo===false?"#15803d":"#dc2626",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                      {p.activo===false?"▶️":"⏸️"}
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    // ── PANEL HISTORIAL ────────────────────────────────────────────────────────
    const PanelHistorial = ({ sesion }) => {
      const [log, setLog]         = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError]     = useState(null);

      const cargar = () => {
        setLoading(true);
        setError(null);
        getMovimientosDia(sesion.sucursal.id)
          .then(data => { setLog(data); setLoading(false); })
          .catch(err => { setError(err.message); setLoading(false); });
      };

      useEffect(()=>{ cargar(); }, []);

      const exportarCSV = () => {
        const header = "Hora,Tipo,Cliente,DNI,Monto,Puntos,Cajero";
        const rows = log.map(l =>
          `${l.hora||""},${l.tipo||""},${l.nombre||""},${l.dni||""},${l.monto||0},${l.pts||0},${l.cajero||""}`
        );
        const csv = [header, ...rows].join("
");
        const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url;
        a.download = `sumaprix_${sesion.sucursal.id}_${hoy().replace(/\//g,"-")}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const iconos  = { venta:"💳", canje:"🎁", registro:"➕" };
      const colores = { venta:"#f0fdf4", canje:"#faf5ff", registro:"#fffbeb" };
      const totalVentas   = log.filter(l=>l.tipo==="venta").length;
      const totalPts      = log.filter(l=>l.tipo==="venta").reduce((a,l)=>a+(l.pts||0),0);
      const totalCanjes   = log.filter(l=>l.tipo==="canje").length;
      const totalRegistros= log.filter(l=>l.tipo==="registro").length;
      const totalMonto    = log.filter(l=>l.tipo==="venta").reduce((a,l)=>a+(Number(l.monto)||0),0);

      return (
        <div style={{ maxWidth:820 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:24 }}>
            <div>
              <div style={{ fontSize:22, fontWeight:900, color:"#111" }}>Movimientos del día</div>
              <div style={{ fontSize:13, color:"#888" }}>{hoy()} · {sesion.sucursal.nombre} · {sesion.cajero}</div>
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={cargar}
                style={{ padding:"9px 16px", borderRadius:10, border:"1px solid #e5e7eb", background:"#fff", color:"#555", fontWeight:700, fontSize:12, cursor:"pointer" }}>
                🔄 Actualizar
              </button>
              {log.length > 0 && (
                <button onClick={exportarCSV}
                  style={{ padding:"9px 16px", borderRadius:10, border:"none", background:"#111", color:"#fff", fontWeight:700, fontSize:12, cursor:"pointer" }}>
                  ⬇️ Exportar CSV
                </button>
              )}
            </div>
          </div>

          {/* Resumen del día */}
          {!loading && log.length > 0 && (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:10, marginBottom:20 }}>
              {[
                { l:"Ventas",     v:totalVentas,                    c:"#10b981", bg:"#f0fdf4" },
                { l:"Monto total",v:`$${totalMonto.toLocaleString()}`, c:"#f59e0b", bg:"#fffbeb" },
                { l:"Pts emitidos",v:totalPts.toLocaleString(),      c:"#6366f1", bg:"#eff6ff" },
                { l:"Canjes",     v:totalCanjes,                    c:"#8b5cf6", bg:"#faf5ff" },
                { l:"Nuevos",     v:totalRegistros,                  c:"#E30613", bg:"#fff5f5" },
              ].map(s=>(
                <div key={s.l} style={{ background:s.bg, borderRadius:14, padding:"12px 10px", textAlign:"center", border:`1px solid ${s.c}22` }}>
                  <div style={{ fontSize:20, fontWeight:900, color:s.c }}>{s.v}</div>
                  <div style={{ fontSize:10, color:"#888", fontWeight:600, marginTop:2 }}>{s.l}</div>
                </div>
              ))}
            </div>
          )}

          {error && (
            <div style={{ background:"#fef2f2", borderRadius:14, padding:16, marginBottom:16, color:"#dc2626", fontSize:13, fontWeight:600 }}>
              ⚠️ Error al cargar: {error}
              <button onClick={cargar} style={{ marginLeft:12, padding:"4px 12px", borderRadius:8, border:"none", background:"#dc2626", color:"#fff", fontWeight:700, fontSize:11, cursor:"pointer" }}>
                Reintentar
              </button>
            </div>
          )}

          <div style={{ background:"#fff", borderRadius:18, overflow:"hidden", boxShadow:"0 2px 10px rgba(0,0,0,.06)" }}>
            {loading && <div style={{padding:40,textAlign:"center",display:"flex",justifyContent:"center"}}><Spinner size={32}/></div>}
            {!loading && !error && log.length===0 && (
              <div style={{padding:40,textAlign:"center",color:"#ccc"}}>
                <div style={{fontSize:36,marginBottom:8}}>📋</div>
                <div style={{fontSize:13}}>Sin movimientos hoy en {sesion.sucursal.nombre}</div>
                <div style={{fontSize:11,marginTop:6,color:"#ddd"}}>Los movimientos aparecen automáticamente al procesar ventas</div>
              </div>
            )}

            {/* Header tabla */}
            {!loading && log.length > 0 && (
              <div style={{display:"flex",alignItems:"center",gap:14,padding:"10px 18px",background:"#f9fafb",borderBottom:"1px solid #f3f4f6"}}>
                <div style={{width:36}}/>
                <div style={{flex:1,fontSize:11,fontWeight:700,color:"#aaa",textTransform:"uppercase",letterSpacing:.5}}>Cliente</div>
                <div style={{width:80,fontSize:11,fontWeight:700,color:"#aaa",textTransform:"uppercase",letterSpacing:.5,textAlign:"center"}}>Monto</div>
                <div style={{width:80,fontSize:11,fontWeight:700,color:"#aaa",textTransform:"uppercase",letterSpacing:.5,textAlign:"right"}}>Puntos</div>
              </div>
            )}

            {log.map((l,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:14,padding:"13px 18px",borderBottom:"1px solid #f3f4f6",animation:"fadeIn .3s ease"}}>
                <div style={{width:36,height:36,borderRadius:9,background:colores[l.tipo]||"#f9fafb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                  {iconos[l.tipo]||"📌"}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#111",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.nombre}</div>
                  <div style={{fontSize:11,color:"#aaa"}}>{l.hora} · DNI {l.dni} · {l.cajero}</div>
                </div>
                <div style={{width:80,textAlign:"center"}}>
                  {l.monto ? <span style={{fontSize:13,color:"#555",fontWeight:600}}>${Number(l.monto).toLocaleString()}</span> : <span style={{color:"#ddd"}}>—</span>}
                </div>
                <div style={{width:80,textAlign:"right",fontSize:13,fontWeight:900,color:l.tipo==="canje"?"#7c3aed":"#10b981"}}>
                  {l.tipo==="canje"?`-${l.pts} pts`:`+${l.pts} pts`}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ── APP PRINCIPAL ──────────────────────────────────────────────────────────
    function App() {
      const [sesion, setSesion]   = useState(null);
      const [tab, setTab]         = useState("venta");
      const [stats, setStats]     = useState({ ventas:0, ptsEmitidos:0, canjes:0 });
      const [toast, setToast]     = useState(null);
      const toastRef = useRef(null);

      const showToast = (msg) => {
        clearTimeout(toastRef.current);
        setToast(msg);
        toastRef.current = setTimeout(()=>setToast(null), 3000);
      };

      const onVenta = (pts) => setStats(s=>({...s, ventas:s.ventas+1, ptsEmitidos:s.ptsEmitidos+pts}));
      const onCanje = ()    => setStats(s=>({...s, canjes:s.canjes+1}));

      if (!sesion) return <LoginScreen onLogin={setSesion}/>;

      return (
        <div style={{ display:"flex", height:"100vh", background:"#f5f5f7" }}>
          {toast && (
            <div style={{position:"fixed",top:18,right:18,background:"#111",color:"#fff",padding:"11px 18px",borderRadius:14,fontSize:13,fontWeight:700,zIndex:999,boxShadow:"0 8px 28px rgba(0,0,0,.25)",animation:"popIn .3s ease",maxWidth:300}}>
              {toast}
            </div>
          )}
          <Sidebar tab={tab} setTab={setTab} sesion={sesion} onLogout={()=>{setSesion(null);setTab("venta");setStats({ventas:0,ptsEmitidos:0,canjes:0});}} stats={stats}/>
          <div style={{ flex:1, overflowY:"auto", padding:"32px 36px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:28 }}>
              <div style={{ fontSize:12, color:"#aaa" }}>{new Date().toLocaleDateString("es-AR",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div>
              <div style={{ display:"flex", alignItems:"center", gap:8, background:"#fff", borderRadius:50, padding:"7px 14px", boxShadow:"0 2px 8px rgba(0,0,0,.06)" }}>
                <div style={{width:7,height:7,borderRadius:"50%",background:"#10b981",animation:"pulse 2s infinite"}}/>
                <span style={{fontSize:12,fontWeight:600,color:"#555"}}>{sesion.cajero} · {sesion.sucursal.nombre}</span>
                <span style={{fontSize:10,color:"#bbb"}}>· Firebase ✓</span>
              </div>
            </div>
            {tab==="venta"    && <PanelVenta    sesion={sesion} onVenta={onVenta} showToast={showToast}/>}
            {tab==="canje"    && <PanelCanje    sesion={sesion} onCanje={onCanje} showToast={showToast}/>}
            {tab==="registro" && <PanelRegistro sesion={sesion} showToast={showToast}/>}
            {tab==="consulta" && <PanelConsulta/>}
            {tab==="historial"&& <PanelHistorial sesion={sesion}/>}
            {tab==="catalogo" && <PanelCatalogo showToast={showToast}/>}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
